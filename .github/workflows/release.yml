name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Fail-fast guard: refuse to publish unless package.json version matches
      # the git tag. Catches the "tagged before bumping version" race that
      # causes `bun publish` to hit "403 Forbidden: cannot publish over
      # previously published versions" mid-pipeline (saw this on v0.17.6 first
      # push; manual retry needed). Better to fail in 5 seconds than 90.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION."
            echo "::error::Bump root package.json + workspace package.json files BEFORE tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test --timeout 60000 packages/*/src

      # contracts/lib is gitignored, so fetch Forge deps fresh on every run.
      # Pinned to versions matching what's vendored locally on developer machines.
      # Direct `git clone` rather than `forge install` because foundry.toml uses
      # `libs = ["contracts/lib"]` (non-default path) and `forge install` always
      # writes to `./lib` ignoring that setting.
      - name: Install Forge libs
        run: |
          mkdir -p contracts/lib
          git clone --depth 1 --branch v1.16.0 \
            https://github.com/foundry-rs/forge-std contracts/lib/forge-std
          git clone --depth 1 --branch v5.6.1 \
            https://github.com/OpenZeppelin/openzeppelin-contracts contracts/lib/openzeppelin-contracts

      - name: Forge tests
        run: forge test

      # bun publish does NOT honor `~/.npmrc` reliably on CI runners (verified
      # silently broken on v0.16.3 manual recovery: workflow reported success
      # but every publish step output `error: missing authentication`, masked
      # by a former `|| true`). Use the npm-cli env convention `NPM_CONFIG_TOKEN`
      # which bun does respect. Keep `~/.npmrc` write as belt-and-suspenders
      # for any tooling that needs it.
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # Publish in topo order. Each `bun publish` rewrites workspace:* deps to
      # the resolved semver in the published tarball; source stays workspace:*.
      # NO `|| true` masking: if publish fails (auth, version conflict, network)
      # the workflow MUST fail loudly. A "version already exists" error means
      # the tag was re-pushed against an already-published version, which is
      # operator error and should surface clearly.
      - name: Publish @s0nderlabs/anima-core
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-comms
        working-directory: packages/plugin-comms
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-onchain
        working-directory: packages/plugin-onchain
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-system
        working-directory: packages/plugin-system
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-gateway
        working-directory: packages/gateway
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima
        working-directory: packages/cli
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes --title "$TAG"
