name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Fail-fast guard: refuse to publish unless package.json version matches
      # the git tag. Catches the "tagged before bumping version" race that
      # causes `bun publish` to hit "403 Forbidden: cannot publish over
      # previously published versions" mid-pipeline (saw this on v0.17.6 first
      # push; manual retry needed). Better to fail in 5 seconds than 90.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION."
            echo "::error::Bump root package.json + workspace package.json files BEFORE tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test --timeout 60000 packages/*/src

      # contracts/lib is gitignored, so fetch Forge deps fresh on every run.
      # Pinned to versions matching what's vendored locally on developer machines.
      # Direct `git clone` rather than `forge install` because foundry.toml uses
      # `libs = ["contracts/lib"]` (non-default path) and `forge install` always
      # writes to `./lib` ignoring that setting.
      - name: Install Forge libs
        run: |
          mkdir -p contracts/lib
          git clone --depth 1 --branch v1.16.0 \
            https://github.com/foundry-rs/forge-std contracts/lib/forge-std
          git clone --depth 1 --branch v5.6.1 \
            https://github.com/OpenZeppelin/openzeppelin-contracts contracts/lib/openzeppelin-contracts

      - name: Forge tests
        run: forge test

      # bun publish does NOT honor `~/.npmrc` reliably on CI runners (verified
      # silently broken on v0.16.3 manual recovery: workflow reported success
      # but every publish step output `error: missing authentication`, masked
      # by a former `|| true`). Use the npm-cli env convention `NPM_CONFIG_TOKEN`
      # which bun does respect. Keep `~/.npmrc` write as belt-and-suspenders
      # for any tooling that needs it.
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # Pre-publish: substitute workspace:* with concrete versions ourselves.
      # We DO NOT trust `bun publish`'s built-in workspace:* rewriter — verified
      # broken May 7 2026: every release v0.21.5 → v0.21.10 published broken
      # metadata where `@s0nderlabs/anima-*` sibling deps stayed pinned at
      # `0.21.4` (the version when the rewriter last worked). The lockfile was
      # fresh, the source was correct; bun publish caches stale resolutions
      # internally for reasons we can't diagnose. So we do the substitution
      # ourselves before bun publish ever runs. See
      # `feedback-bun-publish-workspace-dep-stale.md` in memory.
      - name: Pin workspace deps to concrete version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Pinning @s0nderlabs/anima-* workspace:* deps to ${PKG_VERSION}"
          for f in packages/*/package.json; do
            python3 - "$f" "$PKG_VERSION" <<'PYEOF'
          import json, sys
          path, version = sys.argv[1], sys.argv[2]
          with open(path) as fp:
              pkg = json.load(fp)
          changed = False
          for key in ("dependencies", "peerDependencies", "devDependencies"):
              deps = pkg.get(key)
              if not isinstance(deps, dict):
                  continue
              for name, value in list(deps.items()):
                  if name.startswith("@s0nderlabs/anima-") and isinstance(value, str) and value.startswith("workspace:"):
                      deps[name] = version
                      changed = True
          if changed:
              with open(path, "w") as fp:
                  json.dump(pkg, fp, indent=2)
                  fp.write("\n")
              print(f"  pinned {path}")
          PYEOF
          done

      # Publish in topo order. After our pin step above, the on-disk
      # package.json files no longer contain workspace:* — they carry literal
      # versions, so what bun publish packs into the tarball is exactly what
      # we substituted. NO `|| true` masking: if publish fails (auth, version
      # conflict, network) the workflow MUST fail loudly. A "version already
      # exists" error means the tag was re-pushed against an already-published
      # version, which is operator error and should surface clearly.
      - name: Publish @s0nderlabs/anima-core
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-comms
        working-directory: packages/plugin-comms
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-onchain
        working-directory: packages/plugin-onchain
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-system
        working-directory: packages/plugin-system
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-plugin-telegram
        working-directory: packages/plugin-telegram
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima-gateway
        working-directory: packages/gateway
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      - name: Publish @s0nderlabs/anima
        working-directory: packages/cli
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access=public

      # Post-publish: verify what landed on the registry actually matches the
      # version we just shipped. Belt-and-suspenders for the Pin step above:
      # if anything went sideways (cache, network, partial substitution) we
      # catch it here instead of consumers catching it via broken installs.
      # Direct fetch to registry.npmjs.org bypasses npm view's cache. Retry
      # loop tolerates registry propagation delay (typically <30s). Per-package
      # checks run in parallel; once one is propagated the rest typically are
      # too, so total wall time is dominated by the slowest single package
      # rather than 7x serial worst-case.
      - name: Verify published deps match version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PACKAGES=$(jq -r '.name' packages/*/package.json | tr '\n' ' ')
          RESULTS_DIR=$(mktemp -d)
          for pkg in $PACKAGES; do
            (
              for attempt in 1 2 3 4 5 6; do
                META=$(curl -sf "https://registry.npmjs.org/${pkg}/${PKG_VERSION}" 2>/dev/null || echo "")
                if [ -n "$META" ]; then break; fi
                sleep 10
              done
              SAFE_NAME=$(echo "$pkg" | tr '/' '_')
              if [ -z "$META" ]; then
                echo "::error::${pkg}@${PKG_VERSION} not found on registry after 60s" > "${RESULTS_DIR}/${SAFE_NAME}.err"
                exit 1
              fi
              MISMATCH=$(echo "$META" | jq -r --arg v "$PKG_VERSION" '
                (.dependencies // {}) | to_entries[]
                | select(.key | startswith("@s0nderlabs/anima-"))
                | select(.value != $v)
                | "\(.key)=\(.value)"
              ')
              if [ -n "$MISMATCH" ]; then
                {
                  echo "::error::${pkg}@${PKG_VERSION} has stale @s0nderlabs/anima-* deps (expected ${PKG_VERSION}):"
                  echo "$MISMATCH" | sed 's/^/  /'
                } > "${RESULTS_DIR}/${SAFE_NAME}.err"
                exit 1
              fi
              echo "ok ${pkg}@${PKG_VERSION}" > "${RESULTS_DIR}/${SAFE_NAME}.ok"
            ) &
          done
          wait
          if ls "${RESULTS_DIR}"/*.err >/dev/null 2>&1; then
            cat "${RESULTS_DIR}"/*.err >&2
            echo "::error::Published metadata is broken. Bump to next patch and republish — npm publish-once means broken metadata stays on registry forever." >&2
            exit 1
          fi
          cat "${RESULTS_DIR}"/*.ok
          echo "All published packages have correct sibling deps pinned at ${PKG_VERSION}."

      # Smoke test: install the just-published @s0nderlabs/anima from the npm
      # registry into a fresh tmp dir + verify the gateway binary is present
      # and reports the right version. Catches broken bin entrypoints, missing
      # runtime deps, or transitive resolution failures BEFORE customers hit
      # them. Critical for the npm-bootstrap path (v0.21.15+) where sandbox
      # containers do `bun add -g @s0nderlabs/anima` instead of git clone.
      - name: Smoke test installed gateway binary
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          # Bun's resolver caches the packument fetched during the earlier
          # `Install deps` step (bun install). That cache predates the publish
          # steps above, so `bun add -g` reads stale data and reports
          # "No version matching <NEW_VERSION>" indefinitely — even though the
          # registry has the version (the curl-based "Verify published deps"
          # step passed). Plain retries don't help: bun re-reads the same
          # poisoned cache. Bust the @s0nderlabs scope before each attempt so
          # the next `bun add -g` re-fetches the fresh packument. Hit live on
          # v0.21.20 (CDN-propagation-shaped failure, masked the real cause)
          # and v0.21.21 (3 retries failed identically, exposing the cache).
          for attempt in 1 2 3; do
            rm -rf "$HOME/.bun/install/cache/@s0nderlabs"
            if bun add -g "@s0nderlabs/anima@${PKG_VERSION}"; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::install attempt $attempt failed (likely bun packument cache poisoning); cleared @s0nderlabs cache, sleeping 15s before retry"
              sleep 15
            else
              echo "::error::install failed after 3 attempts at ${PKG_VERSION}"
              exit 1
            fi
          done
          # Bun puts directly-installed bins at ~/.bun/bin/<name> and
          # transitive-dep bins at ~/.bun/install/global/node_modules/.bin/<name>.
          # `anima` is direct (the CLI package), `anima-gateway` is transitive.
          # PATH-walk both dirs so bin lookups don't depend on layout knowledge.
          export PATH="$HOME/.bun/bin:$HOME/.bun/install/global/node_modules/.bin:$PATH"
          for bin in anima anima-gateway; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              echo "::error::$bin not found on PATH after global install"
              echo "~/.bun/bin contents:" && ls -la "$HOME/.bun/bin" || true
              echo "~/.bun/install/global/node_modules/.bin contents:" && ls -la "$HOME/.bun/install/global/node_modules/.bin" || true
              exit 1
            fi
            echo "  ✓ $bin → $(command -v "$bin")"
          done
          # Verify version of every installed @s0nderlabs/anima-* package.
          # 6 packages total: cli + gateway + core + 3 plugins (telegram lives under deps).
          for pkg in anima anima-gateway anima-core anima-plugin-comms anima-plugin-onchain anima-plugin-system anima-plugin-telegram; do
            PKG_JSON="$HOME/.bun/install/global/node_modules/@s0nderlabs/${pkg}/package.json"
            if [ ! -f "$PKG_JSON" ]; then
              echo "::error::@s0nderlabs/${pkg} not installed (missing $PKG_JSON)"
              exit 1
            fi
            INSTALLED_VERSION=$(node -p "require('$PKG_JSON').version")
            if [ "$INSTALLED_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::@s0nderlabs/${pkg}@${INSTALLED_VERSION} does not match expected ${PKG_VERSION}"
              exit 1
            fi
            echo "  ✓ @s0nderlabs/${pkg}@${INSTALLED_VERSION}"
          done
          echo "Smoke test passed: 7 packages installed + bins resolve at ${PKG_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes --title "$TAG"
